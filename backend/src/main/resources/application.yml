server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: smartq-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartq}
    username: ${SPRING_DATASOURCE_USERNAME:smartq}
    password: ${SPRING_DATASOURCE_PASSWORD:smartq}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

smartq:
  jwt:
    secret: ${SMARTQ_JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-minutes: ${SMARTQ_JWT_EXPIRATION_MINUTES:180}
  cors:
    allowed-origin: ${SMARTQ_CORS_ALLOWED_ORIGIN:http://localhost:3000}
