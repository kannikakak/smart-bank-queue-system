server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: smartq-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./.smartq/devdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

smartq:
  jwt:
    secret: ${SMARTQ_JWT_SECRET:change-this-secret-key-change-this-secret-key}
    expiration-minutes: ${SMARTQ_JWT_EXPIRATION_MINUTES:180}
  cors:
    allowed-origin: ${SMARTQ_CORS_ALLOWED_ORIGIN:http://localhost:3000}
