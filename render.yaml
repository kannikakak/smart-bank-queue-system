services:
  - type: web
    name: smartq-backend
    runtime: docker
    rootDir: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smartq-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smartq-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smartq-postgres
          property: password
      - key: SMARTQ_JWT_SECRET
        generateValue: true
      - key: SMARTQ_JWT_EXPIRATION_MINUTES
        value: "180"
      - key: SMARTQ_CORS_ALLOWED_ORIGIN
        sync: false

databases:
  - name: smartq-postgres
    databaseName: smartq
    user: smartq
