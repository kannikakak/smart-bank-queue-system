name: CI

on:
  push:
    branches:
      - main
      - backend
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
      - "render.yaml"
      - "README.md"
      - "docs/**"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
      - "render.yaml"
      - "README.md"
      - "docs/**"

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify backend
        run: mvn -B verify
