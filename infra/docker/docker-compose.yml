services:
  postgres:
    image: postgres:16
    container_name: smartq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartq
      POSTGRES_USER: smartq
      POSTGRES_PASSWORD: smartq
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
